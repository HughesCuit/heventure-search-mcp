name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio ruff
          
      - name: Lint with ruff
        run: |
          ruff check .
          
      - name: Format check with ruff
        run: |
          ruff format --check .
          
      - name: Run unit tests
        run: |
          python -m pytest tests/ -v -m "not integration"

  uvx-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          
      - name: Test uvx installation
        run: |
          uvx heventure-search-mcp --help || true
          
      - name: Test uvx startup (with timeout)
        run: |
          timeout 5 uvx heventure-search-mcp || true

  integration-test:
    runs-on: ubuntu-latest
    needs: [test]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio
          
      - name: Run integration tests
        run: |
          python -m pytest tests/ -v -m "integration" --tb=short
